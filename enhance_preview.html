<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>강화 결과 테스트 · 알칸시아</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <style>
    :root {
      color-scheme: dark;
      --bg: #131720;
      --panel: #1d2430;
      --panel2: #252e3d;
      --ink: #eef2f8;
      --muted: #99a5b7;
      --line: #354154;
      --accent: #5b8def;
      --buy: #37c58f;
      --sell: #ef6b5a;
      --gold: #f2c75c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 15px/1.5 -apple-system, "Apple SD Gothic Neo", "Segoe UI", sans-serif;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 22px;
      border-bottom: 1px solid var(--line);
    }
    h1 { margin: 0; font-size: 20px; }
    header a {
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 10px;
      text-decoration: none;
      font-size: 13px;
      white-space: nowrap;
    }
    main {
      width: min(1120px, calc(100% - 32px));
      margin: 18px auto 48px;
      display: grid;
      grid-template-columns: minmax(300px, 390px) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
      min-width: 0;
    }
    .stack { display: flex; flex-direction: column; gap: 14px; min-width: 0; }
    h2 { margin: 0 0 12px; font-size: 15px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .field { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
    .field.wide { grid-column: 1 / -1; }
    label, legend { color: var(--muted); font-size: 12px; font-weight: 700; }
    input, select, button {
      font: inherit;
    }
    input[type="text"], input[type="number"], select {
      width: 100%;
      min-width: 0;
      background: var(--panel2);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
    }
    textarea {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      background: var(--panel2);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    input[type="checkbox"] { accent-color: var(--accent); }
    .check {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      min-height: 36px;
    }
    fieldset {
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 10px;
      margin: 0;
    }
    legend { padding: 0 4px; }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    button {
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--ink);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    button:hover { border-color: var(--accent); }
    .item-head {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }
    .item-ic {
      width: 48px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #101620;
      border: 1px solid var(--line);
      border-radius: 9px;
    }
    .item-ic img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .item-name { font-size: 18px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }
    .badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      background: var(--panel2);
    }
    .badge.warn { color: var(--gold); border-color: #7c6433; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .metric {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      min-width: 0;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 3px;
    }
    .metric b {
      display: block;
      color: var(--ink);
      font-size: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metric.gold b { color: var(--gold); }
    .metric.buy b { color: var(--buy); }
    .metric.sell b { color: var(--sell); }
    .outcomes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 8px;
    }
    .outcome {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 10px;
      overflow: hidden;
    }
    .outcome.pick { border-color: var(--gold); box-shadow: inset 0 0 0 1px rgba(242, 199, 92, .25); }
    .outcome h3 {
      margin: 0 0 4px;
      font-size: 14px;
    }
    .outcome p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      min-height: 36px;
    }
    .prob {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .prob b { color: var(--ink); font-size: 18px; }
    .bar {
      height: 7px;
      background: #101620;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 5px;
    }
    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
    }
    .fail .bar span { background: var(--sell); }
    .success .bar span { background: var(--buy); }
    .bonus .bar span { background: var(--gold); }
    .roll-result {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #151c27;
      color: var(--muted);
      font-size: 13px;
    }
    .roll-result b { color: var(--gold); }
    .detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .detail-table th, .detail-table td {
      padding: 8px 6px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      text-align: left;
    }
    .detail-table th {
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }
    .detail-table td {
      color: var(--ink);
      min-width: 120px;
    }
    .muted { color: var(--muted); }
    .err {
      color: var(--sell);
      background: #351f24;
      border: 1px solid #65333b;
      border-radius: 8px;
      padding: 10px;
    }
    code {
      color: var(--gold);
      background: #151c27;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 1px 5px;
    }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
    }
    @media (max-width: 520px) {
      header { align-items: flex-start; flex-direction: column; }
      main { width: min(100% - 20px, 1120px); }
      .grid, .metrics { grid-template-columns: 1fr; }
      .detail-table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <header>
    <h1>강화 결과 테스트</h1>
    <a href="./index.html">메인 페이지</a>
  </header>
  <main>
    <section class="panel">
      <h2>입력</h2>
      <div class="grid">
        <div class="field">
          <label for="material-id-1">재료 고유 ID 1</label>
          <input id="material-id-1" type="text" spellcheck="false" autocomplete="off" value="item-a">
        </div>
        <div class="field">
          <label for="material-id-2">재료 고유 ID 2</label>
          <input id="material-id-2" type="text" spellcheck="false" autocomplete="off" value="item-b">
        </div>
        <div class="field wide">
          <label for="inventory-json">인벤토리 스냅샷 JSON</label>
          <textarea id="inventory-json" spellcheck="false">{
  "inventory": {
    "growth_potion+0": ["item-a", "item-b"]
  }
}</textarea>
        </div>
        <div class="field wide">
          <label for="manual-code">스냅샷 없을 때 수동 아이템 코드</label>
          <input id="manual-code" type="text" list="item-list" spellcheck="false" autocomplete="off" value="growth_potion">
          <datalist id="item-list"></datalist>
        </div>
        <div class="field">
          <label for="manual-enh-1">수동 강화 1</label>
          <input id="manual-enh-1" type="number" min="0" max="99" value="0">
        </div>
        <div class="field">
          <label for="manual-enh-2">수동 강화 2</label>
          <input id="manual-enh-2" type="number" min="0" max="99" value="0">
        </div>
        <div class="field">
          <label for="cauldron-enh">솥 강화</label>
          <input id="cauldron-enh" type="number" min="0" max="99" value="0">
        </div>
        <div class="field">
          <label for="wick-level">심지 숙련 Lv</label>
          <input id="wick-level" type="number" min="0" max="10" value="0">
        </div>
        <label class="check">
          <input id="self-cauldron" type="checkbox">
          도구 솥 자가강화
        </label>
        <label class="check wide">
          <input id="seed-ingredient" type="checkbox">
          생명의 씨앗 보유
        </label>
      </div>

      <fieldset style="margin-top:12px">
        <legend>지역 효과</legend>
        <div class="grid">
          <div class="field wide">
            <label for="zone">지역</label>
            <select id="zone">
              <option value="">기타</option>
              <option value="mid_cave">메아리 동굴: 소재 강화 성공 시 +2 가능</option>
              <option value="wind_corridor">바람의 회랑: 씨앗 강화 성공률 증가</option>
              <option value="sunset_cliff">석양 절벽: 결과물 강화도 +1 가능</option>
              <option value="forgotten_fortress">잊힌 성터: 강화 실패 시 재료 반환</option>
            </select>
          </div>
          <div class="field">
            <label for="familiar">낯익은 터</label>
            <input id="familiar" type="number" min="0" max="10" value="0">
          </div>
          <label class="check">
            <input id="fog" type="checkbox">
            안개 해방
          </label>
          <label class="check field wide">
            <input id="zone-buff" type="checkbox">
            지역효과 버프
          </label>
        </div>
      </fieldset>
      <div class="roll-result">
        실제 보관함은 <code>{"itemKey":["id", ...]}</code> 구조입니다. 스냅샷에서 ID를 찾지 못하면 아래 수동 코드와 강화도를 사용합니다.
      </div>
    </section>

    <div class="stack">
      <section id="summary" class="panel"></section>
      <section id="outcomes" class="panel"></section>
      <section id="details" class="panel"></section>
    </div>
  </main>
  <script type="module" src="./js/enhance_preview.js"></script>
</body>
</html>
